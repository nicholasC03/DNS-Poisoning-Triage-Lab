# Example Unbound forwarding configuration using DNS-over-TLS.
# Validate with: unbound-checkconf /path/to/unbound.conf
# Adapt certificate paths and access controls for the local system.

server:
    verbosity: 1
    interface: 127.0.0.1
    port: 53

    # Resolver hardening and DNSSEC-related checks
    harden-glue: yes
    harden-dnssec-stripped: yes
    qname-minimisation: yes
    edns-buffer-size: 1232

    # Used to authenticate upstream TLS certificates
    tls-cert-bundle: "/etc/ssl/certs/ca-certificates.crt"

forward-zone:
    name: "."
    forward-tls-upstream: yes

    # Authenticated upstream DNS-over-TLS endpoints (TCP/853)
    forward-addr: 1.1.1.1@853#cloudflare-dns.com
    forward-addr: 9.9.9.9@853#dns.quad9.net

